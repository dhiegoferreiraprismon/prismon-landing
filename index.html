  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

e-height: 1.7;\n    overflow-x: hidden;\n  }\n\n  /* ─── UTILITY ─────────────────────────────────────────────── */\n  .container { max-width: 1080px; margin: 0 auto; padding: 0 24px; }\n  .section { padding: 100px 0; }\n  .section-sm { padding: 64px 0; }\n\n  h1,h2,h3,h4 { font-family: 'Bricolage Grotesque', sans-serif; line-height: 1.15; }\n\n  .tag {\n    display: inline-flex; align-items: center; gap: 6px;\n    font-family: 'Bricolage Grotesque', sans-serif; font-size: 12px; font-weight: 600;\n    letter-spacing: 0.12em; text-transform: uppercase; color: var(--blue);\n    border: 1px solid var(--border2); border-radius: 100px;\n    padding: 5px 14px; margin-bottom: 24px;\n  }\n  .tag::before { content:''; width:6px; height:6px; background:var(--blue); border-radius:50%; }\n\n  .accent { color: var(--blue); }\n\n  .btn {\n    display: inline-flex; align-items: center; gap: 10px;\n    font-family: 'Bricolage Grotesque', sans-serif; font-size: 14px; font-weight: 700;\n    letter-spacing: 0.08em; text-transform: uppercase;\n    background: var(--grad-accent);\n    color: #0D0D0D;\n    border: none; border-radius: 8px; padding: 16px 36px;\n    cursor: pointer; text-decoration: none;\n    transition: transform 0.15s cubic-bezier(.22,1,.36,1), box-shadow 0.2s;\n    position: relative; overflow: hidden;\n  }\n  .btn::before {\n    content:''; position:absolute; inset:-1px;\n    background: var(--grad-accent);\n    border-radius: 9px; z-index:-1; opacity:0;\n    filter: blur(8px);\n    transition: opacity 0.3s;\n  }\n  .btn::after {\n    content:''; position:absolute; inset:0;\n    background: linear-gradient(135deg, rgba(255,255,255,0.2) 0%, transparent 50%);\n    opacity: 0; transition: opacity 0.2s;\n  }\n  .btn:hover { transform: translateY(-2px) scale(1.01); box-shadow: 0 8px 32px rgba(147,228,228,0.25), 0 0 60px rgba(123,94,167,0.15); }\n  .btn:hover::before { opacity: 1; }\n  .btn:hover::after { opacity: 1; }\n  .btn:active { transform: translateY(0) scale(0.99); }\n\n  .btn-outline {\n    background: rgba(147,228,228,0.04);\n    color: var(--blue);\n    border: 1px solid rgba(147,228,228,0.25);\n    backdrop-filter: blur(8px);\n  }\n  .btn-outline:hover {\n    background: rgba(147,228,228,0.10);\n    border-color: rgba(147,228,228,0.5);\n    box-shadow: 0 0 32px rgba(147,228,228,0.15);\n  }\n\n  /* ─── SCROLL REVEAL ───────────────────────────────────────── */\n  .reveal {\n    opacity: 0; transform: translateY(32px);\n    transition: opacity 0.7s cubic-bezier(.22,1,.36,1), transform 0.7s cubic-bezier(.22,1,.36,1);\n  }\n  .reveal.visible { opacity: 1; transform: translateY(0); }\n  .reveal-left { opacity:0; transform: translateX(-32px); transition: opacity 0.7s cubic-bezier(.22,1,.36,1), transform 0.7s cubic-bezier(.22,1,.36,1); }\n  .reveal-left.visible { opacity:1; transform: translateX(0); }\n  .reveal-right { opacity:0; transform: translateX(32px); transition: opacity 0.7s cubic-bezier(.22,1,.36,1), transform 0.7s cubic-bezier(.22,1,.36,1); }\n  .reveal-right.visible { opacity:1; transform: translateX(0); }\n\n  /* ─── NOISE OVERLAY ───────────────────────────────────────── */\n  body::before {\n    content:''; position:fixed; inset:0; pointer-events:none; z-index:999;\n    background-image: url(\"data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E\");\n    opacity: 0.4;\n  }\n\n  /* ─── NAV ─────────────────────────────────────────────────── */\n  nav {\n    position: fixed; top: 0; left: 0; right: 0; z-index: 100;\n    padding: 0 24px;\n    transition: background 0.4s, backdrop-filter 0.4s, border-color 0.4s;\n    border-bottom: 1px solid transparent;\n  }\n  nav.scrolled {\n    background: rgba(13,13,13,0.88); backdrop-filter: blur(20px);\n    border-color: rgba(147,228,2 gn-items: center; justify-content: center;\n    margin: 0 auto 24px;\n  }\n  .form-success-icon svg { width: 32px; height: 32px; color: var(--blue); }\n  .form-success h3 { font-size: 28px; font-weight: 800; margin-bottom: 12px; }\n  .form-success p { font-size: 16px; color: var(--muted); }\n\n  /* ─── FOOTER ──────────────────────────────────────────────── */\n  footer {\n    background: var(--bg); border-top: 1px solid var(--border);\n    padding: 40px 0; text-align: center;\n  }\n  footer img { height: 24px; opacity: 0.5; margin-bottom: 16px; }\n  footer p { font-size: 13px; color: var(--muted2); }\n\n  /* ─── CURSOR ORB ─────────────────────────────────────────── */\n  #cursor-orb {\n    position: fixed; top: 0; left: 0; z-index: 9998; pointer-events: none;\n    width: 420px; height: 420px; border-radius: 50%;\n    background: radial-gradient(circle, rgba(147,228,228,0.09) 0%, transparent 70%);\n    transform: translate(-50%, -50%);\n    transition: transform 0.12s cubic-bezier(.22,1,.36,1);\n    will-change: transform;\n  }\n\n  /* ─── HERO CANVAS ─────────────────────────────────────────── */\n  #hero-canvas {\n    position: absolute; inset: 0; pointer-events: none; z-index: 1;\n  }\n\n  /* ─── FLOATING ORBS ───────────────────────────────────────── */\n  .float-orb {\n    position: fixed; border-radius: 50%; pointer-events: none; z-index: 0;\n    filter: blur(80px); opacity: 0.06; will-change: transform;\n  }\n  .float-orb-1 {\n    width: 600px; height: 600px;\n    background: radial-gradient(circle, rgba(37,118,143,0.6), rgba(147,228,228,0.2));\n    top: -200px; right: -200px;\n    animation: orbFloat1 18s ease-in-out infinite;\n  }\n  .float-orb-2 {\n    width: 400px; height: 400px;\n    background: radial-gradient(circle, rgba(123,94,167,0.6), rgba(37,118,143,0.2));\n    bottom: 20%; left: -150px;\n    animation: orbFloat2 22s ease-in-out infinite;\n  }\n  @keyframes orbFloat1 {\n    0%,100%{transform:translate(0,0) scale(1)}\n    33%{transform:translate(- efore, .benefit:hover::before,\n  .obj-item:hover::before, .stat-item:hover::before { left: 130%; top: -100%; }\n\n  /* ─── MARQUEE STRIP ───────────────────────────────────────── */\n  .marquee-section {\n    background: rgba(10,26,40,0.7); border-top: 1px solid rgba(147,228,228,0.08); border-bottom: 1px solid rgba(147,228,228,0.08);\n    padding: 20px 0; overflow: hidden; position: relative;\n  }\n  .marquee-track { display: flex; gap: 0; width: max-content; animation: marquee 28s linear infinite; }\n  .marquee-track:hover { animation-play-state: paused; }\n  .marquee-item {\n    display: flex; align-items: center; gap: 16px; padding: 0 48px;\n    font-family: 'Bricolage Grotesque', sans-serif; font-size: 13px; font-weight: 700;\n    letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted2); white-space: nowrap;\n  }\n  .marquee-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--blue); opacity: 0.5; flex-shrink: 0; }\n  @keyframes marquee { from { transform: translateX(0); } to { transform: translateX(-50%); } }\n\n  /* ─── HERO TITLE ──────────────────────────────────────────── */\n  .hero-title em {\n    position: relative;\n    display: inline-block; padding: 0 4px;\n    background: var(--grad-accent); -webkit-background-clip: text; -webkit-text-fill-color: transparent;\n    background-clip: text;\n    animation: accentPulse 4s ease-in-out infinite;\n  }\n  @keyframes accentPulse {\n    0%,100%{filter:drop-shadow(0 0 12px rgba(147,228,228,0.4))}\n    50%{filter:drop-shadow(0 0 28px rgba(147,228,228,0.7))}\n  }\n\n  /* ─── STAT NUMBER GRADIENT ────────────────────────────────── */\n  .stat-number {\n    font-family: 'Bricolage Grotesque', sans-serif;\n    font-size: clamp(36px, 5vw, 58px); font-weight: 800;\n    background: var(--grad-accent); -webkit-background-clip: text; -webkit-text-fill-color: transparent;\n    background-clip: text;\n    line-height: 1; margin-bottom: 8px; letter-spacing: -0.02em;\n  }\n\n  /* ─── SOLUTION CLARITY ────────────────────────────────────── */\n  .solution-clarity {\n    background: rgba(10,26,40,0.5); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);\n    border: 1px solid rgba(147,228,228,0.12); border-radius: var(--r3);\n    padding: 44px 48px; display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 24px;\n    position: relative; overflow: hidden;\n  }\n  .solution-clarity::before {\n    content:''; position:absolute; top:0; left:0; right:0; height:1px;\n    background: linear-gradient(90deg, transparent, rgba(147,228,228,0.4), rgba(123,94,167,0.3), transparent);\n  }\n\n  /* ─── PAIN CLOSE ──────────────────────────────────────────── */\n  .pain-close {\n    margin-top: 48px; padding: 28px 32px;\n    background: rgba(10,26,40,0.5); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);\n    border: 1px solid rgba(147,228,228,0.1); border-left: 2px solid var(--blue); border-radius: var(--r2);\n    max-width: 640px;\n  }\n\n  /* ─── GUARANTEE NUM ───────────────────────────────────────── */\n  .guarantee-num {\n    animation: numPulse 3s ease-in-out infinite;\n    background: var(--grad-accent); -webkit-background-clip: text; -webkit-text-fill-color: transparent;\n    background-clip: text;\n  }\n  @keyframes numPulse {\n    0%,100%{filter:drop-shadow(0 0 20px rgba(147,228,228,0.3))}\n    50%{filter:drop-shadow(0 0 50px rgba(147,228,228,0.6))}\n  }\n\n  /* ─── OFFER CARD BORDER ───────────────────────────────────── */\n  .offer-card::before { animation: borderGlow 3s ease-in-out infinite; }\n  @keyframes borderGlow { 0%,100%{opacity:0.5} 50%{opacity:1} }\n\n  /* ─── TAG SHEEN ───────────────────────────────────────────── */\n  .tag { position: relative; overflow: hidden; }\n  .tag::after {\n    content:''; position:absolute; left:-100%; top:0; bottom:0; width:100%;\n    background:linear-gradient(90deg,transparent,rgba(147,228,228,0.3),transparent);\n    animation: tagSheen 4s ease-in-out infinite 1s;\n  }\n  @keyframes tagSheen { 0%,100%{left:-100%} 40%,60%{left:100%} }\n\n  /* ─── SCARCITY PULSE ──────────────────────────────────────── */\n  .scarcity-badge::before { animation: pulse 1.5s ease-in-out infinite; }\n\n  /* ─── FORM INPUT UPGRADED ─────────────────────────────────── */\n  input, textarea, select {\n    background: rgba(13,13,13,0.8) !important;\n    backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);\n    border: 1px solid rgba(147,228,228,0.1) !important;\n  }\n  input:focus, textarea:focus, select:focus {\n    border-color: rgba(147,228,228,0.35) !important;\n    box-shadow: 0 0 0 3px rgba(147,228,228,0.08) !important;\n  }\n\n  /* ─── TWEAKS PANEL ────────────────────────────────────────── */\n  #tweaks-panel {\n    display: none; position: fixed; bottom: 24px; right: 24px; z-index: 9999;\n    background: rgba(10,26,40,0.92); backdrop-filter: blur(20px);\n    border: 1px solid rgba(147,228,228,0.2); border-radius: var(--r3);\n    padding: 24px; width: 260px; box-shadow: 0 24px 80px rgba(0,0,0,0.6);\n  }\n  #tweaks-panel.visible { display: block; }\n  .tweaks-title {\n    font-family: 'Bricolage Grotesque', sans-serif; font-size: 13px; font-weight: 700;\n    letter-spacing: 0.1em; text-transform: uppercase; color: var(--blue);\n    margin-bottom: 18px; display: flex; align-items: center; gap: 8px;\n  }\n  .tweaks-title::before { content:''; width:6px; height:6px; background:var(--blue); border-radius:50%; }\n  .tweak-group { margin-bottom: 16px; }\n  .tweak-label { font-size: 11px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; }\n  .tweak-options { display: flex; gap: 6px; flex-wrap: wrap; }\n  .tweak-opt {\n    font-size: 12px; padding: 5px 12px; border-radius: 100px;\n    border: 1px solid var(--border); background: transparent; color: var(--muted);\n    cursor: pointer; transition: all 0.2s; font-family: 'DM Sans', sans-serif;\n  }\n  .tweak-opt.active { border-color: var(--blue); color: var(--blue); background: var(--blue-dim); }\n  .tweak-opt:hover:not(.active) { border-color: rgba(147,228,228,0.3); color: var(--text); }\n\n  /* ─── RESPONSIVE ──────────────────────────────────────────── */\n  @media (max-width: 768px) {\n    .section { padding: 72px 0; }\n    .stats-grid { grid-template-columns: 1fr; }\n    .offer-grid { grid-template-columns: 1fr; }\n    .guarantee-inner { grid-template-columns: 1fr; }\n    .solution-clarity { grid-template-columns: 1fr; }\n    .form-row { grid-template-columns: 1fr; }\n    .obj-grid { grid-template-columns: 1fr; }\n    .hero-prisma { display: none; }\n    .hero-content { max-width: 100%; }\n  }\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n\n<!-- CURSOR ORB -->\n<div id=\"cursor-orb\"><\u002Fdiv>\n\n<!-- FLOATING ORBS -->\n<div class=\"float-orb float-orb-1\"><\u002Fdiv>\n<div class=\"float-orb float-orb-2\"><\u002Fdiv>\n\n<!-- NAV -->\n<nav id=\"main-nav\">\n  <div class=\"nav-inner\">\n    <div class=\"nav-logo\">\n      <img src=\"a1df6515-96cc-44fa-9908-d34618b08b4d\" alt=\"Prismon\">\n    <\u002Fdiv>\n    <div class=\"nav-cta\">\n      <a href=\"#form-section\" class=\"btn\">Agendar Diagnóstico<\u002Fa>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fnav>\n\n<!-- HERO -->\n<section id=\"hero\">\n  <div class=\"hero-bg\"><\u002Fdiv>\n  <div class=\"hero-grid\"><\u002Fdiv>\n  <canvas id=\"hero-canvas\"><\u002Fcanvas>\n  <div class=\"container\">\n    <div class=\"hero-content\">\n      <div class=\"hero-eyebrow reveal\"><span>Prismon<\u002Fspan> — Gestão de Tráfego para E-commerce<\u002Fdiv>\n      <h1 class=\"hero-title reveal\" style=\"transition-delay:0.1s\">\n        Se o seu e-commerce<br>\n        não escala, o problema<br>\n        não é o produto —<br>\n        é a <em>estratégia.<\u002Fem>\n      <\u002Fh1>\n      <p class=\"hero-sub reveal\" style=\"transition-delay:0.2s\">\n        Gestão de tráfego completa para e-commerces que querem sair da estagnação e crescer com consistência — sem destruir margem no processo.\n      <\u002Fp>\n      <div class=\"hero-ctas reveal\" style=\"transition-delay:0.3s\">\n        <a href=\"#form-section\" class=\"btn\">\n          <svg width=\"16\" height=\"16\" viewBox=\"0 0 16 16\" fill=\"none\"><path d=\"M8 1.5v13M1.5 8h13\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\"><\u002Fpath><\u002Fsvg>\n          Agendar Diagnóstico Estratégico\n        <\u002Fa>\n        <a href=\"#solution\" class=\"btn btn-outline\">Ver como funciona<\u002Fa>\n      <\u002Fdiv>\n      <div class=\"hero-note reveal\" style=\"transition-delay:0.4s\">Sem compromisso — analisamos sua operação gratuitamente<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- MARQUEE -->\n<div class=\"marquee-section\">\n  <div class=\"marquee-track\" id=\"marquee-track\">\n    <div class=\"marquee-item\"><div class=\"marquee-dot\"><\u002Fdiv>Gestão Estratégica de Tráfego<\u002Fdiv>\n    <div class=\"marquee-item\"><div class=\"marquee-dot\"><\u002Fdiv>Meta Ads<\u002Fdiv>\n    <div class=\"marquee-item\"><div class=\"marquee-dot\"><\u002Fdiv>Escala com Consistência<\u002Fdiv>\n    <div class=\"marquee-item\"><div class=\"marquee-dot\"><\u002Fdiv>Análise de Dados<\u002Fdiv>\n    <div class=\"marquee-item\"><div class=\"marquee-dot\"><\u002Fdiv>Direcionamento de Criativos<\u002Fdiv>\n    <div class=\"marquee-item\"><div class=\"marquee-dot\"><\u002Fdiv>+20M Investidos<\u002Fdiv>\n    <div class=\"marquee-item\"><div class=\"marquee-dot\"><\u002Fdiv>6 Anos de Experiência<\u002Fdiv>\n    <div class=\"marquee-item\"><div class=\"marquee-dot\"><\u002Fdiv>Dhiego Ferreira<\u002Fdiv>\n    <div class=\"marquee-item\"><div class=\"marquee-dot\"><\u002Fdiv>Agência Prismon<\u002Fdiv>\n    <div class=\"marquee-item\"><div class=\"marquee-dot\"><\u002Fdiv>Gestão Estratégica de Tráfego<\u002Fdiv>\n    <div class=\"marquee-item\"><div class=\"marquee-dot\"><\u002Fdiv>Meta Ads<\u002Fdiv>\n    <div class=\"marquee-item\"><div class=\"marquee-dot\"><\u002Fdiv>Escala com Consistência<\u002Fdiv>\n    <div class=\"marquee-item\"><div class=\"marquee-dot\"><\u002Fdiv>Análise de Dados<\u002Fdiv>\n    <div class=\"marquee-item\"><div class=\"marquee-dot\"><\u002Fdiv>Direcionamento de Criativos<\u002Fdiv>\n    <div class=\"marquee-item\"><div class=\"marquee-dot\"><\u002Fdiv>+20M Investidos<\u002Fdiv>\n    <div class=\"marquee-item\"><div class=\"marquee-dot\"><\u002Fdiv>6 Anos de Experiência<\u002Fdiv>\n    <div class=\"marquee-item\"><div class=\"marquee-dot\"><\u002Fdiv>Dhiego Ferreira<\u002Fdiv>\n    <div class=\"marquee-item\"><div class=\"marquee-dot\"><\u002Fdiv>Agência Prismon<\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- STATS -->\n<section id=\"stats\">\n  <div class=\"container\">\n    <div class=\"stats-grid\">\n      <div class=\"stat-item reveal\">\n        <div class=\"stat-number\"><span class=\"counter\" data-target=\"20\" data-prefix=\"+\" data-suffix=\"M\">0<\u002Fspan><\u002Fdiv>\n        <div class=\"stat-label\">Investidos em Meta Ads<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"stat-item reveal\" style=\"transition-delay:0.1s\">\n        <div class=\"stat-number\"><span class=\"counter\" data-target=\"6\" data-suffix=\" anos\">0<\u002Fspan><\u002Fdiv>\n        <div class=\"stat-label\">de experiência em e-commerce<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"stat-item reveal\" style=\"transition-delay:0.2s\">\n        <div class=\"stat-number\"><span class=\"counter\" data-target=\"100\" data-suffix=\"%\">0<\u002Fspan><\u002Fdiv>\n        <div class=\"stat-label\">Foco em escala com consistência<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- PAIN -->\n<section id=\"pain\" class=\"section\">\n  <div class=\"container\">\n    <div class=\"pain-header\">\n      <div class=\"tag reveal\">Identificação do problema<\u002Fdiv>\n      <h2 class=\"reveal\" style=\"transition-delay:0.1s\">\n        Se você se identifica com isso,<br>\n        sua operação está <em style=\"color:var(--blue);font-style:normal\">pronta para escalar<\u002Fem> —<br>\n        mas algo está impedindo.\n      <\u002Fh2>\n    <\u002Fdiv>\n    <div class=\"pain-grid\">\n      <div class=\"pain-item reveal\" style=\"transition-delay:0.05s\">\n        <div class=\"pain-icon\"><svg viewBox=\"0 0 14 14\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.5\"><path d=\"M7 1v6M7 10v1\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n        <p>Você já investe em tráfego, mas não consegue escalar com consistência<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"pain-item reveal\" style=\"transition-delay:0.1s\">\n        <div class=\"pain-icon\"><svg viewBox=\"0 0 14 14\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.5\"><path d=\"M2 7h10M7 2v10\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n        <p>Quando aumenta o orçamento, a performance cai<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"pain-item reveal\" style=\"transition-delay:0.15s\">\n        <div class=\"pain-icon\"><svg viewBox=\"0 0 14 14\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.5\"><circle cx=\"7\" cy=\"7\" r=\"5\"><\u002Fcircle><path d=\"M7 4v4\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n        <p>Vive testando criativos, mas sem clareza do que realmente funciona<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"pain-item reveal\" style=\"transition-delay:0.2s\">\n        <div class=\"pain-icon\"><svg viewBox=\"0 0 14 14\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.5\"><path d=\"M2 12L12 2M2 2l10 10\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n        <p>Sente que está \"no escuro\" nas decisões de crescimento<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"pain-item reveal\" style=\"transition-delay:0.25s\">\n        <div class=\"pain-icon\"><svg viewBox=\"0 0 14 14\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.5\"><path d=\"M2 7h10M7 2v10\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n        <p>Seu faturamento oscila e não existe previsibilidade<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"pa    <label for=\"challenge\">Qual é o seu maior desafio hoje?<\u002Flabel>\n            <textarea id=\"challenge\" placeholder=\"Descreva brevemente onde está travando…\"><\u002Ftextarea>\n          <\u002Fdiv>\n          <div class=\"form-submit\">\n            <button type=\"submit\" class=\"btn\">\n              <svg width=\"16\" height=\"16\" viewBox=\"0 0 16 16\" fill=\"none\"><path d=\"M8 1.5v13M1.5 8h13\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\"><\u002Fpath><\u002Fsvg>\n              Agendar meu Diagnóstico Estratégico\n            <\u002Fbutton>\n          <\u002Fdiv>\n          <p class=\"form-legal\">Dhiego Ferreira entrará em contato via WhatsApp em até 24h úteis.<\u002Fp>\n        <\u002Fform>\n\n        <div class=\"form-success\" id=\"form-success\">\n          <div class=\"form-success-icon\">\n            <svg viewBox=\"0 0 32 32\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><path d=\"M6 16l7 7L26 9\"><\u002Fpath><\u002Fsvg>\n          <\u002Fdiv>\n          <h3>Diagnóstico agendado!<\u002Fh3>\n          <p>Dhiego entrará em contato via WhatsApp em até 24h úteis para alinhar o diagnóstico estratégico da sua operação.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- FOOTER -->\n<footer>\n  <div class=\"container\">\n    <img src=\"a1df6515-96cc-44fa-9908-d34618b08b4d\" alt=\"Prismon\">\n    <p>© 2025 Agência Prismon · Dhiego Ferreira · Gestão de Tráfego para E-commerce<\u002Fp>\n  <\u002Fdiv>\n<\u002Ffooter>\n\n  <div class=\"tweak-group\">\n    <div class=\"tweak-label\">Headline<\u002Fdiv>\n    <div class=\"tweak-options\">\n      <button class=\"tweak-opt\" data-tweak=\"headline\" data-val=\"v3\">V3 (atual)<\u002Fbutton>\n      <button class=\"tweak-opt\" data-tweak=\"headline\" data-val=\"v1\">V1<\u002Fbutton>\n      <button class=\"tweak-opt\" data-tweak=\"headline\" data-val=\"v2\">V2<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"twe ss=\"tweak-opt active\" data-tweak=\"bg\" data-val=\"#0D0D0D\">Preto<\u002Fbutton>\n      <button class=\"tweak-opt\" data-tweak=\"bg\" data-val=\"#0A1A28\">Navy<\u002Fbutton>\n      <button class=\"tweak-opt\" data-tweak=\"bg\" data-val=\"#0E0A07\">Quente<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<script>\n// ─── CURSOR ORB ───────────────────────────────────────\nconst cursorOrb = document.getElementById('cursor-orb');\nlet mouseX = window.innerWidth / 2, mouseY = window.innerHeight / 2;\nlet orbX = mouseX, orbY = mouseY;\ndocument.addEventListener('mousemove', e => { mouseX = e.clientX; mouseY = e.clientY; });\n(function animateOrb() {\n  orbX += (mouseX - orbX) * 0.08;\n  orbY += (mouseY - orbY) * 0.08;\n  if (cursorOrb) cursorOrb.style.transform = `translate(calc(${orbX}px - 50%), calc(${orbY}px - 50%))`;\n  requestAnimationFrame(animateOrb);\n})();\n\n// ─── HERO CANVAS PARTICLES ────────────────────────────\n(function initParticles() {\n  const canvas = document.getElementById('hero-canvas');\n  if (!canvas) return;\n  const ctx = canvas.getContext('2d');\n  let W, H, particles = [];\n\n  function resize() {\n    W = canvas.width = canvas.offsetWidth;\n    H = canvas.height = canvas.offsetHeight;\n  }\n  resize();\n  window.addEventListener('resize', resize);\n\n  const COUNT = 55;\n  for (let i = 0; i < COUNT; i++) {\n    particles.push({\n      x: Math.random() * W, y: Math.random() * H,\n      r: Math.random() * 1.5 + 0.3,\n      vx: (Math.random() - 0.5) * 0.25,\n      vy: (Math.random() - 0.5) * 0.25,\n      o: Math.random() * 0.5 + 0.1,\n      pulse: Math.random() * Math.PI * 2\n    });\n  }\n\n  function draw(ts) {\n    ctx.clearRect(0, 0, W, H);\n    particles.forEach(p => {\n      p.pulse += 0.012;\n      p.x += p.vx; p.y += p.vy;\n      if (p.x < 0) p.x = W; if (p.x > W) p.x = 0;\n      if (p.y < 0) p.y = H; if (p.y > H) p.y = 0;\n\n      // connect nearby\n      particles.forEach(q => {\n        const dx = p.x - q.x, dy = p.y - q.y;\n        const dist = Math.sqrt(dx*dx + dy*dy);\n        if (dist < 120) {\n          ctx.beginPath();\n          ctx.strokeStyle = `rgba(147,228,228,${0.06 * (1 - dist/120)})`;\n          ctx.lineWidth = 0.5;\n          ctx.moveTo(p.x, p.y); ctx.lineTo(q.x, q.y);\n          ctx.stroke();\n        }\n      });\n\n      const alpha = p.o * (0.7 + 0.3 * Math.sin(p.pulse));\n      ctx.beginPath();\n      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);\n      ctx.fillStyle = `rgba(147,228,228,${alpha})`;\n      ctx.fill();\n    });\n    requestAnimationFrame(draw);\n  }\n  requestAnimationFrame(draw);\n})();\n\n// ─── HERO TITLE WORD SPLIT ────────────────────────────\n(function splitHeroTitle() {\n  const title = document.querySelector('.hero-title');\n  if (!title) return;\n  const rawHTML = title.innerHTML.trim();\n  const parts = rawHTML.split(/(<br\\s*\\/?>|<em[^>]*>[\\s\\S]*?<\\/em>)/gi);\n  let result = '';\n  parts.forEach(part => {\n    if (/^<br/i.test(part)) { result += '<br>'; return; }\n    if (/^<em/i.test(part)) {\n      result += `<span class=\"word-wrap\"><span class=\"word-inner\">${part.trim()}&nbsp;<\u002Fspan><\u002Fspan>`;\n      return;\n    }\n    part.trim().split(/\\s+/).forEach(word => {\n      if (word.trim()) result += `<span class=\"word-wrap\"><span class=\"word-inner\">${word}&nbsp;<\u002Fspan><\u002Fspan>`;\n    });\n  });\n  title.innerHTML = result;\n\n  const words = title.querySelectorAll('.word-inner');\n  words.forEach((w, i) => {\n    setTimeout(() => w.classList.add('in'), 200 + i * 80);\n  });\n\n  // Ensure block spacing after collapsed h1\n  const spacer = document.createElement('div');\n  spacer.style.cssText = 'display:block; height:52px; width:100%;';\n  title.after(spacer);\n})();\n\n// ─── NAV SCROLL ──────────────────────────────────────\nconst nav = document.getElementById('main-nav');\nwindow.addEventListener('scroll', () => {\n  nav.classList.toggle('scrolled', window.scrollY > 40);\n});\n\n// ─── SCROLL REVEAL ───────────────────────────────────\nconst revealEls = document.querySelectorAll('.reveal, .reveal-left, .reveal-right');\nconst observer = new IntersectionObserver((entries) => {\n  entries.forEach(e => {\n    if (e.isIntersecting) {\n      e.target.classList.add('visible');\n      observer.unobserve(e.target);\n    }\n  });\n}, { threshold: 0.08, rootMargin: '0px 0px -30px 0px' });\nrevealEls.forEach(el => observer.observe(el));\n\n// ─── ANIMATED COUNTERS ───────────────────────────────\nfunction animateCounter(el) {\n  const target = +el.dataset.target;\n  const prefix = el.dataset.prefix || '';\n  const suffix = el.dataset.suffix || '';\n  const duration = 2200;\n  let start = null;\n  const step = (ts) => {\n    if (!start) start = ts;\n    const progress = Math.min((ts - start) / duration, 1);\n    // elastic-ish easing\n    const ease = progress === 1 ? 1 : 1 - Math.pow(2, -10 * progress);\n    el.textContent = prefix + Math.floor(ease * target) + suffix;\n    if (progress < 1) requestAnimationFrame(step);\n  };\n  requestAnimationFrame(step);\n}\n\nconst counterObs = new IntersectionObserver((entries) => {\n  entries.forEach(e => {\n    if (e.isIntersecting) {\n      animateCounter(e.target);\n      counterObs.unobserve(e.target);\n    }\n  });\n}, { threshold: 0.5 });\ndocument.querySelectorAll('.counter').forEach(el => counterObs.observe(el));\n\n// ─── FAQ ACCORDION ────────────────────────────────────\ndocument.querySelectorAll('.faq-q').forEach(btn => {\n  btn.addEventListener('click', () => {\n    const item = btn.closest('.faq-item');\n    const isOpen = item.classList.contains('open');\n    document.querySelectorAll('.faq-item.open').forEach(i => i.classList.remove('open'));\n    if (!isOpen) item.classList.add('open');\n  });\n});\n\n// ─── MAGNETIC BUTTONS ────────────────────────────────\ndocument.querySelectorAll('.btn').forEach(btn => {\n  btn.addEventListener('mousemove', e => {\n    const r = btn.getBoundingClientRect();\n    const dx = e.clientX - (r.left + r.width / 2);\n    const dy = e.clientY - (r.top + r.height / 2);\n    btn.style.transform = `translate(${dx * 0.18}px, ${dy * 0.18}px) translateY(-2px)`;\n  });\n  btn.addEventListener('mouseleave', () => {\n    btn.style.transform = '';\n  });\n});\n\n// ─── HERO PARALLAX ───────────────────────────────────\nconst heroGrid = document.querySelector('.hero-grid');\nconst heroBg = document.querySelector('.hero-bg');\nwindow.addEventListener('scroll', () => {\n  const y = window.scrollY;\n  if (heroGrid) heroGrid.style.transform = `translateY(${y * 0.2}px)`;\n  if (heroBg) heroBg.style.transform = `translateY(${y * 0.1}px)`;\n  // subtle parallax on hero content\n  const heroContent = document.querySelector('.hero-content');\n  if (heroContent) heroContent.style.transform = `translateY(${y * 0.06}px)`;\n}, { passive: true });\n\n// ─── STAT ITEMS TILT ─────────────────────────────────\ndocument.querySelectorAll('.stat-item, .pillar, .offer-card, .guarantee-card').forEach(card => {\n  card.addEventListener('mousemove', e => {\n    const r = card.getBoundingClientRect();\n    const x = (e.clientX - r.left) / r.width - 0.5;\n    const y = (e.clientY - r.top) / r.height - 0.5;\n    card.style.transform = `perspective(600px) rotateY(${x * 6}deg) rotateX(${-y * 6}deg) translateY(-4px)`;\n    card.style.transition = 'transform 0.1s ease';\n  });\n  card.addEventListener('mouseleave', () => {\n    card.style.transform = '';\n    card.style.transition = 'transform 0.4s cubic-bezier(.22,1,.36,1)';\n  });\n});\n\n// ─── FORM SUBMIT ─────────────────────────────────────\ndocument.getElementById('contact-form').addEventListener('submit', (e) => {\n  e.preventDefault();\n  const form = e.target;\n  const btn = form.querySelector('.btn');\n  btn.textContent = 'Enviando…';\n  btn.style.opacity = '0.7';\n  setTimeout(() => {\n    form.style.display = 'none';\n    document.getElementById('form-success').classList.add('active');\n  }, 1200);\n});\n\n// ─── WHATSAPP MASK ───────────────────────────────────\ndocument.getElementById('whatsapp').addEventListener('input', function() {\n  let v = this.value.replace(/\\D/g, '').slice(0, 11);\n  if (v.length > 6) v = `(${v.slice(0,2)}) ${v.slice(2,7)}-${v.slice(7)}`;\n  else if (v.length > 2) v = `(${v.slice(0,2)}) ${v.slice(2)}`;\n  else if (v.length > 0) v = `(${v}`;\n  this.value = v;\n});\n\n\n// ─── TWEAKS ──────────────────────────────────────────\nconst TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{\n  \"accentColor\": \"#93E4E4\",\n  \"bgColor\": \"#0D0D0D\",\n  \"headline\": \"v3\"\n}/*EDITMODE-END*/;\n\nconst headlines = {\n  v1: `Escalar seu e-commerce não é<br>sobre investir mais — é sobre<br><em>saber onde investir.<\u002Fem>`,\n  v2: `Pare de travar no mesmo<br>faturamento: transforme<br>seu e-commerce em uma<br><em>máquina de escala previsível.<\u002Fem>`,\n  v3: `Se o seu e-commerce<br>não escala, o problema<br>não é o produto —<br>é a <em>estratégia.<\u002Fem>`\n};\n\nfunction applyTweaks(vals) {\n  document.documentElement.style.setProperty('--blue', vals.accentColor);\n  document.documentElement.style.setProperty('--blue-dim', vals.accentColor + '14');\n  document.documentElement.style.setProperty('--blue-glow', vals.accentColor + '47');\n  document.documentElement.style.setProperty('--border2', vals.accentColor + '38');\n  document.documentElement.style.setProperty('--bg', vals.bgColor);\n  document.querySelectorAll('[data-tweak=\"accent\"]').forEach(b => b.classList.toggle('active', b.dataset.val === vals.accentColor));\n  document.querySelectorAll('[data-tweak=\"bg\"]').forEach(b => b.classList.toggle('active', b.dataset.val === vals.bgColor));\n  document.querySelectorAll('[data-tweak=\"headline\"]').forEach(b => b.classList.toggle('active', b.dataset.val === vals.headline));\n}\n\nlet tweakState = { ...TWEAK_DEFAULTS };\napplyTweaks(tweakState);\n\ndocument.querySelectorAll('.tweak-opt').forEach(btn => {\n  btn.addEventListener('click', () => {\n    const key = btn.dataset.tweak;\n    const val = btn.dataset.val;\n    if (key === 'accent') tweakState.accentColor = val;\n    else if (key === 'bg') tweakState.bgColor = val;\n    else if (key === 'headline') tweakState.headline = val;\n    applyTweaks(tweakState);\n    window.parent.postMessage({ type: '__edit_mode_set_keys', edits: tweakState }, '*');\n  });\n});\n\nwindow.addEventListener('message', e => {\n  if (e.data?.type === '__activate_edit_mode') document.getElementById('tweaks-panel').classList.add('visible');\n  else if (e.data?.type === '__deactivate_edit_mode') document.getElementById('tweaks-panel').classList.remove('visible');\n});\nwindow.parent.postMessage({ type: '__edit_mode_available' }, '*');\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
